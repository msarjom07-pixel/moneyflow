    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;background:#04101e}
    body{overscroll-behavior:none;-webkit-overflow-scrolling:touch}
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;background:#04101e;z-index:9999;transition:opacity 0.3s}
    .logo{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:#d8eeff;letter-spacing:-0.02em}
    .logo span{color:#3d9bff}
    .spinner{width:36px;height:36px;border:3px solid #153660;border-top-color:#3d9bff;border-radius:50%;animation:spin 0.8s linear infinite}
    .load-txt{color:#6a9bc5;font-family:'Outfit',sans-serif;font-size:13px}
    #err{display:none;background:#3d1525;border:1px solid #ff5c7c;border-radius:12px;padding:16px 20px;max-width:300px;color:#ff5c7c;font-family:'Outfit',sans-serif;font-size:12px;line-height:1.6}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6) sepia(1) saturate(3) hue-rotate(180deg)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#153660;border-radius:2px}
  </style>

  <div id="loading">
    <div class="logo">Money<span>Flow</span></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <script>
    function showErr(msg) {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('.load-txt').textContent = 'Failed to load';
      var e = document.getElementById('err');
      e.style.display = 'block';
      e.innerHTML = '<strong>⚠️ Error</strong><br>' + msg;
      console.error('MoneyFlow error:', msg);
    }

    function mount() {
      try {
        if (!window.React)    return showErr('React CDN failed. Check internet.');
        if (!window.ReactDOM) return showErr('ReactDOM CDN failed. Check internet.');
        if (!window.Chart)    return showErr('Chart.js CDN failed. Check internet.');

        // App code is plain JS (no JSX) — execute directly
        var fn = new Function('React', 'ReactDOM', APP_CODE + '\nreturn MoneyFlowApp;');
        var App = fn(React, ReactDOM);

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));

        var loader = document.getElementById('loading');
        loader.style.opacity = '0';
        setTimeout(function(){ loader.style.display = 'none'; }, 300);
      } catch(e) {
        showErr(e.message + '<br><small style="opacity:0.6">' + (e.stack||'').split('\n')[0] + '</small>');
      }
    }

    // Inject app code as a variable to avoid script-tag parsing issues
    var APP_CODE = document.getElementById('app-code').textContent;

    if (document.readyState === 'complete') { mount(); }
    else { window.addEventListener('load', mount); }
  </script>

// MoneyFlow v2 - uses Chart.js via CDN (no Recharts)
const { useState, useEffect, useRef, useCallback } = React;

// Chart.js components wrapped for React
function ChartCanvas({ setup, deps }) {
  const ref = useRef(null);
  const instance = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.Chart) return;
    if (instance.current) { instance.current.destroy(); instance.current = null; }
    const ctx = ref.current.getContext('2d');
    instance.current = new window.Chart(ctx, setup());
    return () => { if (instance.current) instance.current.destroy(); };
  }, deps || []);
  return React.createElement('canvas', { ref, style: { width: '100%', maxHeight: 220 } });
}

  const now = new Date(); const txs = []; let id = 0;

  const savD  = [{cat:"emrg",amt:500},{cat:"tvl",amt:300},{cat:"is",amt:600}];
  for (let m = 2; m >= 0; m--) {
    const mo = new Date(now.getFullYear(), now.getMonth()-m, 1);
    incD.forEach(({cat,amt},i) => { const d=new Date(mo); d.setDate(1+i*3); const co=INIT_CATS.income.find(c=>c.id===cat); txs.push({id:`t${id++}`,type:"income",amount:amt+Math.round((Math.random()-.5)*amt*.1),currency:"USD",category:cat,date:d.toISOString().split("T")[0],note:co.name+" payment",attachments:[]}); });
    expD.forEach(({cat,amt},i) => { const d=new Date(mo); d.setDate(2+i*2); const co=INIT_CATS.expense.find(c=>c.id===cat); const cur=["USD","EUR","GBP"][Math.floor(Math.random()*3)]; txs.push({id:`t${id++}`,type:"expense",amount:amt+Math.round((Math.random()-.5)*amt*.2),currency:cur,category:cat,date:d.toISOString().split("T")[0],note:co.name,attachments:[]}); });

  }
  return txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
};

const TxItem = ({ tx, cats, defaultCurrency, onEdit, onDelete }) => {
  const allCats = [...cats.income,...cats.expense,...cats.savings];
  const cat = allCats.find(c=>c.id===tx.category)||{icon:"💸",color:C.sub,name:"Other"};
  const disp = fromUSD(toUSD(tx.amount, tx.currency), defaultCurrency);
  const sym  = getCurSym(defaultCurrency);

        return React.createElement('button', { key:id, onClick:()=>setScreen(id), style:{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"none", border:"none", cursor:"pointer", padding:"6px 0 8px" } },
          React.createElement(Icon, { name:icoName, size:20, color:active?C.accent:C.sub }),
          React.createElement('span', { style:{ fontSize:10, fontFamily:"'Outfit',sans-serif", fontWeight:active?700:400, color:active?C.accent:C.sub } }, label),
          active && React.createElement('div', { style:{ width:4, height:4, borderRadius:"50%", background:C.accent } })
        );
      })
    )
  );
}
